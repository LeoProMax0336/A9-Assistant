<body>
<div class="app-container">

    <!-- ===== 主页 ===== -->
    <div id="homePage">
        <div class="home-title">🏎️ 狂野飙车9 · 小助手</div>
        <div class="home-cards">
            <div class="home-card" data-target="cars">
                <span class="home-icon">🚗</span>
                <div class="home-label">车辆档案馆</div>
                <div class="home-desc">浏览全车数据，对比性能</div>
            </div>
            <div class="home-card" data-target="master">
                <span class="home-icon">🏁</span>
                <div class="home-label">大师计算器</div>
                <div class="home-desc">追踪大师任务进度</div>
            </div>
            <div class="home-card" data-target="special">
                <span class="home-icon">🏆</span>
                <div class="home-label">特殊赛事</div>
                <div class="home-desc">自定义赛事计算器</div>
            </div>
        </div>
    </div>

    <!-- ===== 功能容器 ===== -->
    <div id="functionContainer" class="function-container">

        <!-- ===== 车辆档案馆 ===== -->
        <div id="carsFunction" class="function-section">
            <div class="toolbar" id="carsToolbar">
                <button class="back-home-btn" id="backHomeFromCars">🏠 主页</button>
                <div class="sort-section">
                    <span>📊</span>
                    <select id="sortField">
                        <option value="perf">性能分</option>
                        <option value="speed">极速</option>
                        <option value="accel">加速</option>
                        <option value="handling">操控</option>
                        <option value="nitro">氮气</option>
                    </select>
                    <select id="sortOrder">
                        <option value="desc">↓</option>
                        <option value="asc">↑</option>
                    </select>
                </div>
                <div class="sort-section">
                    <span>📌</span>
                    <div class="mode-toggle" id="modeToggle">
                        <div class="mode-btn active" data-mode="global">全局</div>
                        <div class="mode-btn" data-mode="level">等级</div>
                    </div>
                </div>
                <div class="sort-section">
                    <span>🏷️</span>
                    <select id="brandFilter" class="brand-select"><option value="all">全部品牌</option></select>
                </div>
                <div class="sort-section">
                    <span>🏆</span>
                    <select id="leagueFilter" class="league-select"><option value="all">全部联赛</option></select>
                </div>
                <div class="sort-section">
                    <span>🔍</span>
                    <input type="text" id="searchInput" class="search-input" placeholder="车名或昵称" />
                </div>
                <div class="toolbar-actions">
                    <button class="help-btn" id="helpBtn">📖 说明</button>
                </div>
            </div>

            <div class="stats-panel" id="statsPanel">
                <div class="stats-group">
                    <div class="stats-item"><span class="stats-number" id="totalCount">0</span><span class="stats-label">总车辆</span></div>
                    <span class="stats-divider">|</span>
                    <div class="stats-item"><span class="stats-level-badge R">R</span><span class="stats-number" id="countR">0</span></div>
                    <div class="stats-item"><span class="stats-level-badge S">S</span><span class="stats-number" id="countS">0</span></div>
                    <div class="stats-item"><span class="stats-level-badge A">A</span><span class="stats-number" id="countA">0</span></div>
                    <div class="stats-item"><span class="stats-level-badge B">B</span><span class="stats-number" id="countB">0</span></div>
                    <div class="stats-item"><span class="stats-level-badge C">C</span><span class="stats-number" id="countC">0</span></div>
                    <div class="stats-item"><span class="stats-level-badge D">D</span><span class="stats-number" id="countD">0</span></div>

            </div>

            <div id="carsGrid" class="cars-grid"></div>

                        <label><input type="checkbox" id="packKeyGold" /> 点券钥匙包</label>

                    <button class="editor-btn editor-btn-success" id="saveEventData">💾 保存赛事数据</button>

                    <button class="editor-btn" id="syncToRemoteBtn" style="background:#f59e0b;">☁️ 发布到云端</button>
                </div>
            </div>

            <!-- ===== 计算器 ===== -->
            <div id="specialCalculator" class="calculator-section" style="display:none;">
                <h3>📊 特殊赛事计算器</h3>
                <div id="calcTitle" style="font-size:1.2rem; font-weight:700; margin-bottom:8px;"></div>
                <div id="calcUpdateTime" style="font-size:0.8rem; color:#94a3b8; margin-bottom:12px;"></div>
                <div class="calc-controls">
                    <button class="btn-fill" id="calcFillAll">⬆️ 拉满车库</button>
                    <button class="btn-clear" id="calcClearAll">🗑️ 清空车库</button>
                </div>
                <div id="calcVehicles"></div>
                <div id="calcStages" style="margin-top:16px;"></div>
                <div id="calcRewards" style="margin-top:16px;"></div>
            </div>
        </div>

    </div><!-- /functionContainer -->

    <!-- ===== 等级导航 ===== -->
    <div class="level-nav" id="levelNav">
        <button data-level="D">D</button>
        <button data-level="C">C</button>
        <button data-level="B">B</button>
        <button data-level="A">A</button>
        <button data-level="S">S</button>
        <button data-level="R">R</button>
    </div>

    <!-- ===== 浮动按钮组 ===== -->
    <div class="float-group" id="floatGroup">
        <button class="float-btn" id="floatCompareBtn" title="对比模式">🔍</button>
        <button class="float-btn theme-btn" id="themeBtn" title="切换主题">🌓</button>
        <button class="float-btn back-to-top" id="backToTopBtn" title="回到顶部">↑</button>
    </div>
    <button class="exit-compare-btn" id="exitCompareBtn" style="display:none;">← 返回</button>

    <script>
        // ================================================================
        //  完整逻辑 + 远程同步（已配置你给的 Raw 地址）
        // ================================================================

        // 🔴 你提供的真实地址
        const REMOTE_EVENT_URL = 'https://raw.githubusercontent.com/LeoProMax0336/A9-Assistant/refs/heads/main/event.json';

        // ========== 全局变量（与之前相同） ==========
        const colorMap = { "红色": "#ef4444", "金色": "#fbbf24", "天蓝": "#06b6d4", "紫色": "#a855f7", "浅蓝": "#38bdf8" };
        const leagueColorMap = {
            "传奇": "#F4DD68", "宗师": "#ef4444", "精英": "#FF0066", "钻石": "#66FFFF",
            "黄金": "#FF9900", "翡翠": "#66FF99", "白金": "#FF33CC", "白银": "#00CCFF", "青铜": "#FA6B00"
        };
        const levelPriority = { "R": 7, "S": 6, "A": 5, "B": 4, "C": 3, "D": 2 };
        let vehiclesData = [];
        let specialEventData = null;
        let selectedTools = [];
        let stages = [];
        let milestones = [];
        let clubRewards = [];
        let calcVehicleStates = {};
        const STORAGE_KEY = 'specialEventData_v4';
        let currentSortField = "perf", currentSortOrder = "desc", currentBrand = "all", currentLeague = "all", currentSearch = "";
        let sortMode = "global";
        let compareMode = false, selectedForCompare = [];
        let currentAppMode = 'cars';
        let globalMax = { topSpeed: 0, accel: 0, handling: 0, nitro: 0 };

        // ========== DOM 引用 ==========
        const homePage = document.getElementById('homePage');
        const functionContainer = document.getElementById('functionContainer');
        const carsFunction = document.getElementById('carsFunction');
        const masterFunction = document.getElementById('masterFunction');
        const specialFunction = document.getElementById('specialFunction');
        const carsToolbar = document.getElementById('carsToolbar');
        const masterToolbar = document.getElementById('masterToolbar');
        const specialToolbar = document.getElementById('specialToolbar');
        let gridContainer, brandSelect, leagueSelect, sortFieldSelect, sortOrderSelect, searchInput, modeToggle;
        let compareBtn, themeBtn, backToTopBtn, exitCompareBtn, helpBtn, helpBtnMaster, helpBtnSpecial;

        // ========== 工具函数 ==========
        function parseTags(tagStr) {
            if (!tagStr || tagStr.trim() === "") return [];
            return tagStr.split('/').map(t => t.trim()).filter(t => t);
        }
        function extractFeelTags(tags) {
            const feelSet = new Set(["船车", "轮椅", "稳定", "跳跃", "虚高"]);
            return tags.filter(t => feelSet.has(t));
        }
        function formatNitrospeedAdvanced(raw) {
            if (raw === null || raw === undefined || raw === "") return "<span>?</span>";
            const str = String(raw).trim();
            if (!str.includes('/')) {
                if (str === "未知") return `<span class="nitro-part">未知</span>`;
                return `<span class="nitro-part">${str}</span>`;
            }
            let parts = str.split('/').map(s => s.trim());
            while (parts.length < 4) parts.push("未知");
            const colors = ["#eab308", "#ef4444", "#38bdf8", "#a855f7"];
            const numeric = parts.map(p => p === "未知" ? null : parseFloat(p));
            if (numeric.every(v => v === null)) return `<span class="nitro-part">未知</span>`;
            const validNums = numeric.filter(v => v !== null);
            const minVal = Math.min(...validNums);
            let output = [];
            let minOutput = false;
            for (let i = 0; i < parts.length; i++) {
                const val = numeric[i];
                if (val === null) { output.push(`<span class="nitro-part">未知</span>`); continue; }
                if (val === minVal && !minOutput) { output.push(`<span class="nitro-part">${val}</span>`); minOutput = true; } else if (val > minVal) { output.push(`<span class="nitro-part" style="color: ${colors[i]};">+${val}</span>`); }
            }
            return output.join(' / ');
        }

        function computeRankAndPercent(arr, getValue) {
            if (arr.length === 0) return new Map();
            const items = arr.map(car => ({ car, val: getValue(car) }));
            items.sort((a, b) => {
                const va = (a.val === null || isNaN(a.val)) ? -Infinity : a.val;
                const vb = (b.val === null || isNaN(b.val)) ? -Infinity : b.val;
                return vb - va;
            });
            const total = items.length;
            const result = new Map();
            for (let i = 0; i < total; i++) {
                const val = items[i].val;
                if (val === null || isNaN(val)) { result.set(items[i].car, { rank: total, percent: 0 }); continue; }
                let firstEqual = i;
                while (firstEqual > 0 && items[firstEqual - 1].val === val) firstEqual--;
                const rank = firstEqual + 1;
                let percent = total > 1 ? Math.round(((rank - 1) / (total - 1)) * 100) : 100;
                percent = percent === 0 ? 1 : percent;
                result.set(items[i].car, { rank, percent });
                while (i + 1 < total && items[i + 1].val === val) i++;
            }
            return result;
        }

        function addRanksToVehicles(vehicles) {
            const validVehicles = vehicles.filter(car => car && typeof car === 'object');
            if (validVehicles.length === 0) return;
            const leagues = {};
            for (let car of validVehicles) {
                const league = car.league;
                if (!leagues[league]) leagues[league] = [];
                leagues[league].push(car);
            }
            const metrics = ['perfScore', 'topSpeed', 'accel', 'handling', 'nitro'];
            for (let car of validVehicles) { car.rankGlobal = {}; car.rankLeague = {}; car.totalGlobal = {}; car.totalLeague = {}; }
            for (let metric of metrics) {
                const getter = car => car[metric];
                const rankMap = computeRankAndPercent(validVehicles, getter);
                for (let car of validVehicles) {
                    const info = rankMap.get(car);
                    if (info) { car.rankGlobal[metric] = info.rank; car.totalGlobal[metric] = validVehicles.length; } else { car.rankGlobal[metric] = validVehicles.length; car.totalGlobal[metric] = validVehicles.length; }
                }
            }
            for (let league in leagues) {
                const leagueCars = leagues[league];
                for (let metric of metrics) {
                    const getter = car => car[metric];
                    const rankMap = computeRankAndPercent(leagueCars, getter);
                    for (let car of leagueCars) {
                        const info = rankMap.get(car);
                        if (info) { car.rankLeague[metric] = info.rank; car.totalLeague[metric] = leagueCars.length; } else { car.rankLeague[metric] = leagueCars.length; car.totalLeague[metric] = leagueCars.length; }
                    }
                }
            }
        }

        function processAllVehicles() {
            const rawValid = vehiclesDataRaw.filter(v => v && typeof v === 'object');
            const processed = rawValid.map(v => {
                if (!v.leagueColor) v.leagueColor = leagueColorMap[v.league] || "#F4DD68";
                const tagArray = parseTags(v.tags);
                const feelTagsArray = extractFeelTags(tagArray);
                const toNum = (val) => (val === "未知" || val === null || val === undefined) ? null : parseFloat(val);
                return {
                    ...v,
                    topSpeed: toNum(v.topSpeed),
                    accel: toNum(v.accel),
                    handling: toNum(v.handling),
                    nitro: toNum(v.nitro),
                    airSpeed: v.airSpeed === "未知" ? "未知" : toNum(v.airSpeed),
                    tags: tagArray,
                    feelTags: feelTagsArray,
                    remark: v.remark || ""
                };
            });
            globalMax.topSpeed = Math.max(...processed.map(v => v.topSpeed).filter(v => v !== null && !isNaN(v)));
            globalMax.accel = Math.max(...processed.map(v => v.accel).filter(v => v !== null && !isNaN(v)));
            globalMax.handling = Math.max(...processed.map(v => v.handling).filter(v => v !== null && !isNaN(v)));
            globalMax.nitro = Math.max(...processed.map(v => v.nitro).filter(v => v !== null && !isNaN(v)));
            addRanksToVehicles(processed);
            return processed;
        }

        function findVehicleInfo(carName) {
            let info = vehiclesData.find(v => v.name === carName);
            if (info) return { level: info.level, needKey: info.needKey, blueprintColor: info.blueprintColor, maxStars: info.maxStars, perfScore: info.perfScore };
            const normalized = (s) => s.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
            const target = normalized(carName);
            for (let v of vehiclesData) {
                if (normalized(v.name) === target) {
                    return { level: v.level, needKey: v.needKey, blueprintColor: v.blueprintColor, maxStars: v.maxStars, perfScore: v.perfScore };
                }
            }
            return { level: '?', needKey: false, blueprintColor: '金色', maxStars: 0, perfScore: 0 };
        }

        // ========== 车辆档案馆 ==========
        function populateFilters() {
            const brands = [...new Set(vehiclesData.map(c => c.brand))];
            brandSelect.innerHTML = '<option value="all">全部品牌</option>';
            brands.forEach(b => { const opt = document.createElement("option"); opt.value = b; opt.textContent = b; brandSelect.appendChild(opt); });
            const leagues = [...new Set(vehiclesData.map(c => c.league))];
            leagueSelect.innerHTML = '<option value="all">全部联赛</option>';
            leagues.forEach(l => { const opt = document.createElement("option"); opt.value = l; opt.textContent = l; leagueSelect.appendChild(opt); });
        }

        function getFieldValue(car, field) {
            switch (field) {
                case "perf": return car.perfScore;
                case "speed": return (typeof car.topSpeed === 'number' && !isNaN(car.topSpeed)) ? car.topSpeed : 0;
                case "accel": return (typeof car.accel === 'number' && !isNaN(car.accel)) ? car.accel : 0;
                case "handling": return (typeof car.handling === 'number' && !isNaN(car.handling)) ? car.handling : 0;
                case "nitro": return (typeof car.nitro === 'number' && !isNaN(car.nitro)) ? car.nitro : 0;
                default: return 0;
            }
        }

        function getFilteredSortedCars() {
            let filtered = [...vehiclesData];
            if (currentBrand !== "all") filtered = filtered.filter(c => c.brand === currentBrand);
            if (currentLeague !== "all") filtered = filtered.filter(c => c.league === currentLeague);
            if (currentSearch.trim() !== "") {
                const term = currentSearch.trim().toLowerCase();
                filtered = filtered.filter(c => c.name.toLowerCase().includes(term) || (c.nickname && c.nickname.toLowerCase().includes(term)));
            }
            const order = currentSortOrder === "asc" ? 1 : -1;
            if (sortMode === "global") {
                filtered.sort((a, b) => {
                    let va = getFieldValue(a, currentSortField);
                    let vb = getFieldValue(b, currentSortField);
                    if (va < vb) return -1 * order;
                    if (va > vb) return 1 * order;
                    return 0;
                });
            } else {
                filtered.sort((a, b) => {
                    const levelDiff = (levelPriority[b.level] || 0) - (levelPriority[a.level] || 0);
                    if (levelDiff !== 0) return levelDiff;
                    let va = getFieldValue(a, currentSortField);
                    let vb = getFieldValue(b, currentSortField);
                    if (va < vb) return -1 * order;
                    if (va > vb) return 1 * order;
                    return 0;
                });
            }
            return filtered;
        }

        function updateStats() {
            const total = vehiclesData.length;
            document.getElementById('totalCount').textContent = total;
            const levels = { R: 0, S: 0, A: 0, B: 0, C: 0, D: 0 };
            for (let c of vehiclesData) { if (levels[c.level] !== undefined) levels[c.level]++; }
            document.getElementById('countR').textContent = levels.R;
            document.getElementById('countS').textContent = levels.S;
            document.getElementById('countA').textContent = levels.A;
            document.getElementById('countB').textContent = levels.B;
            document.getElementById('countC').textContent = levels.C;
            document.getElementById('countD').textContent = levels.D;
        }

        function renderBlueprintSeq(car) {
            if (!car.blueprintSeq) return '';
            const numbers = car.blueprintSeq.split('/').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
            const total = numbers.reduce((a, b) => a + b, 0);
            const bgColor = colorMap[car.blueprintColor] || "#fbbf24";
            let html = '';
            if (car.needKey) html += `<div class="bp-block key-block" style="background-color:${bgColor};color:white;">🔑</div>`;
            for (let num of numbers) html += `<div class="bp-block" style="flex:${num} 1 0%;background-color:${bgColor};color:white;">${num}</div>`;
            html += `<div class="total-block" style="border-color:${bgColor};color:${bgColor};">总计 ${total}</div>`;
            return `<div class="blueprint-row">${html}</div>`;
        }

        function getStarDisplay(stars) { return '⭐'.repeat(stars) + ` ${stars}星`; }
        function formatValue(val) { return (val === null || val === undefined || val === "未知") ? "未知" : val; }

        function renderTags(tags) {
            if (!tags || tags.length === 0) return '';
            const tagMap = { "滑流": "tag-slstream", "经典": "tag-classic", "对决": "tag-duel" };
            return tags.map(t => `<span class="tag ${tagMap[t] || ''}">${t}</span>`).join('');
        }

        function renderFeelTags(feelTags) {
            if (!feelTags || feelTags.length === 0) return '';
            const classMap = { "船车": "feel-ship", "虚高": "feel-overrated", "轮椅": "feel-wheelchair", "跳跃": "feel-bounce", "稳定": "feel-stable" };
            return `<div class="feel-row">${feelTags.map(t => `<span class="feel-tag ${classMap[t] || ''}">${t}</span>`).join('')}</div>`;
        }

        function createCardHTML(car, isCompareMode = false, isSelected = false) {
            const speedPercent = (car.topSpeed !== null && globalMax.topSpeed > 0) ? (car.topSpeed / globalMax.topSpeed) * 100 : 0;
            const accelPercent = (car.accel !== null && globalMax.accel > 0) ? (car.accel / globalMax.accel) * 100 : 0;
            const handlingPercent = (car.handling !== null && globalMax.handling > 0) ? (car.handling / globalMax.handling) * 100 : 0;
            const nitroPercent = (car.nitro !== null && globalMax.nitro > 0) ? (car.nitro / globalMax.nitro) * 100 : 0;
            let partsHtml = '';
            if (car.partsBlue > 0) partsHtml += `<div class="hexagon hex-blue">${car.partsBlue}</div>`;
            if (car.partsPurple > 0) partsHtml += `<div class="hexagon hex-purple">${car.partsPurple}</div>`;
            if (car.partsGold > 0) partsHtml += `<div class="hexagon hex-gold">${car.partsGold}</div>`;
            const nitroAirHtml = formatNitrospeedAdvanced(car.nitroAirSpeedRaw);
            const checkboxHtml = isCompareMode ? `<div class="checkbox-container ${isSelected ? 'selected' : ''}" data-id="${car.name}"></div>` : '';
            const tagsHtml = renderTags(car.tags);
            const feelHtml = renderFeelTags(car.feelTags);
            const remarkHtml = car.remark ? `<div class="remark">${car.remark}</div>` : '';
            const perfRankGlobal = car.rankGlobal?.perfScore || 0;
            const perfTotalGlobal = car.totalGlobal?.perfScore || 0;
            const perfRankLeague = car.rankLeague?.perfScore || 0;
            const perfTotalLeague = car.totalLeague?.perfScore || 0;
            let perfPercentGlobal = perfTotalGlobal > 1 ? Math.round(((perfRankGlobal - 1) / (perfTotalGlobal - 1)) * 100) : 100;
            let perfPercentLeague = perfTotalLeague > 1 ? Math.round(((perfRankLeague - 1) / (perfTotalLeague - 1)) * 100) : 100;
            perfPercentGlobal = perfPercentGlobal === 0 ? 1 : perfPercentGlobal;
            perfPercentLeague = perfPercentLeague === 0 ? 1 : perfPercentLeague;
            const metrics = [
                { label: '🚀 最大速度', value: car.topSpeed, key: 'topSpeed', leagueColor: car.leagueColor },
                { label: '⚡ 加速', value: car.accel, key: 'accel', leagueColor: car.leagueColor },
                { label: '🎮 操控', value: car.handling, key: 'handling', leagueColor: car.leagueColor },
                { label: '💨 氮气', value: car.nitro, key: 'nitro', leagueColor: car.leagueColor }
            ];
            let statsHtml = '';
            for (let m of metrics) {
                const rankGlobal = car.rankGlobal?.[m.key] || 0;
                const totalGlobal = car.totalGlobal?.[m.key] || 0;
                const rankLeague = car.rankLeague?.[m.key] || 0;
                const totalLeague = car.totalLeague?.[m.key] || 0;
                let percentGlobal = totalGlobal > 1 ? Math.round(((rankGlobal - 1) / (totalGlobal - 1)) * 100) : 100;
                let percentLeague = totalLeague > 1 ? Math.round(((rankLeague - 1) / (totalLeague - 1)) * 100) : 100;
                percentGlobal = percentGlobal === 0 ? 1 : percentGlobal;
                percentLeague = percentLeague === 0 ? 1 : percentLeague;
                const leagueRankText = `<strong>${rankLeague}/${totalLeague}</strong> ${percentLeague}%`;
                const globalRankText = `<strong>${rankGlobal}/${totalGlobal}</strong> ${percentGlobal}%`;
                const barWidth = (m.value !== null && globalMax[m.key] > 0) ? (m.value / globalMax[m.key]) * 100 : 0;
                statsHtml += `
                        <div class="stat-item">
                            <div class="stat-label">${m.label}</div>
                            <div class="stat-value">
                                <span>${formatValue(m.value)}</span>
                                <span class="stat-percentages">
                                    <span class="rank-and-percent" style="color:${m.leagueColor};">${leagueRankText}</span>
                                    <span class="rank-and-percent" style="color:#3b82f6;">${globalRankText}</span>
                                </span>
                            </div>
                            <div class="bar-bg"><div class="bar-fill" style="width:${barWidth}%;"></div></div>
                        </div>
                    `;
            }
            return `
                    <div class="car-card" data-name="${car.name}" data-level="${car.level}">
                        ${checkboxHtml}
                        <div class="row-name">
                            <span class="car-level">${car.level}</span>
                            <div class="car-name">${car.name}</div>
                            <div class="league-badge" style="background-color:${car.leagueColor};">${car.league}</div>
                            ${tagsHtml}
                        </div>
                        <div class="row-stats">
                            <div class="star-rating">${getStarDisplay(car.maxStars)}</div>
                            <div class="nickname">${car.nickname || ""}</div>
                            <div class="perf-score">
                                🏁 ${car.perfScore}
                                <span class="rank-league" style="color:${car.leagueColor};"> <strong>${perfRankLeague}/${perfTotalLeague}</strong> ${perfPercentLeague}%</span>
                                <span class="rank-global" style="color:#3b82f6;"> <strong>${perfRankGlobal}/${perfTotalGlobal}</strong> ${perfPercentGlobal}%</span>
                            </div>
                        </div>
                        ${renderBlueprintSeq(car)}
                        <div class="two-columns">
                            <div class="left-stats">${statsHtml}</div>
                            <div class="right-extra">
                                <div class="airspeed-box">
                                    <div class="airspeed-item"><div class="airspeed-label">氮速</div><div class="airspeed-value">${nitroAirHtml}</div></div>
                                    <div class="airspeed-item"><div class="airspeed-label">空速</div><div class="airspeed-value">${formatValue(car.airSpeed)}</div></div>
                                </div>
                                <div><div class="stat-label" style="text-align:center;">进口零件</div><div class="parts-row">${partsHtml || '<span style="font-size:0.7rem;color:#aaa;">暂无</span>'}</div></div>
                                ${feelHtml}
                                ${remarkHtml}
                            </div>
                        </div>
                    </div>
                `;
        }

        function showDetailModal(car) {
            const overlay = document.createElement('div');
            overlay.className = 'detail-overlay';
            const cardHtml = createCardHTML(car, false, false);
            overlay.innerHTML = `
                    <div class="detail-modal-content">
                        <button class="detail-close">✕</button>
                        ${cardHtml}
                    </div>
                `;
            document.body.appendChild(overlay);
            overlay.querySelector('.detail-close').addEventListener('click', () => overlay.remove());
            overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
        }

        function renderCars() {
            const cars = getFilteredSortedCars();
            if (cars.length === 0) { gridContainer.innerHTML = '<div class="no-data">🚗 没有找到符合筛选条件的车辆～ 试试重置筛选吧</div>'; return; }
            let cardsHtml = '';
            for (let car of cars) {
                const isSelected = compareMode && selectedForCompare.some(c => c.name === car.name);
                cardsHtml += createCardHTML(car, compareMode, isSelected);
            }
            gridContainer.innerHTML = cardsHtml;
            bindLevelNav();
            updateStats();
            if (compareMode) {
                document.querySelectorAll('.checkbox-container').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const name = el.getAttribute('data-id');
                        const car = vehiclesData.find(c => c.name === name);
                        if (!car) return;
                        const idx = selectedForCompare.findIndex(c => c.name === name);
                        if (idx !== -1) selectedForCompare.splice(idx, 1);
                        else { if (selectedForCompare.length >= 2) { alert("最多只能选两辆车对比"); return; } selectedForCompare.push(car); }
                        renderCars();
                        if (selectedForCompare.length === 2) showCompareModal(selectedForCompare[0], selectedForCompare[1]);
                    });
                });
            }
            document.querySelectorAll('.car-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.checkbox-container')) return;
                    const name = card.getAttribute('data-name');
                    const car = vehiclesData.find(c => c.name === name);
                    if (car) showDetailModal(car);
                });
            });
        }

        function getFinalNitroAirSpeed(car) {
            let raw = car.nitroAirSpeedRaw;
            if (raw === null || raw === undefined) return null;
            let str = String(raw);
            if (str.includes('/')) {
                const parts = str.split('/').map(s => s.trim());
                const nums = parts.map(p => p === "未知" ? null : parseFloat(p)).filter(v => v !== null);
                if (nums.length === 0) return null;
                return Math.max(...nums);
            }
            let num = parseFloat(str);
            return isNaN(num) ? null : num;

            if (value === null || isNaN(value)) return { text: "-", className: "diff-unknown" };
            if (value === 0) return { text: "=", className: "diff-zero" };
            let formatted = value.toFixed(decimalPlaces);
            if (value > 0) formatted = "+" + formatted;
            return { text: formatted, className: value > 0 ? "diff-positive" : "diff-negative" };
        }

        // ========== 大师计算器 ==========
        function buildMasterData() {
            const map = new Map();
            for (let row of masterRawData) {
                const masterName = row.master;
                if (!map.has(masterName)) { map.set(masterName, { masterCar: masterName, tools: [] }); }
                const scores = row.scores.split('/').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
                map.get(masterName).tools.push({ carName: row.tool, level: row.level.trim(), scores: scores });
            }
            const tasks = [];
            for (let [master, data] of map) {
                const masterInfo = findVehicleInfo(master);
                const toolsWithInfo = data.tools.map(tool => {
                    const info = findVehicleInfo(tool.carName);
                    return { ...tool, ...info, level: tool.level || info.level || '?' };
                });
                const id = masterIdMap[master] || '??';
                tasks.push({ id, masterCar: master, masterInfo, tools: toolsWithInfo });
            }
            tasks.sort((a, b) => parseInt(a.id) - parseInt(b.id));
            return tasks;
        }

        function getMasterProgressKey(masterName, toolName) { return `master_${masterName}_${toolName}`; }

        function getMasterToolProgress(masterName, toolName) {
            const key = getMasterProgressKey(masterName, toolName);
            try { const val = localStorage.getItem(key); return val !== null ? parseInt(val, 10) : 0; } catch { return 0; }
        }

        function setMasterToolProgress(masterName, toolName, count) {
            const key = getMasterProgressKey(masterName, toolName);
            localStorage.setItem(key, String(count));
        }

        function calcMasterTaskProgress(task) {
            let total = 0, done = 0;
            for (let tool of task.tools) {
                const len = tool.scores.length;
                total += len;
                const prog = getMasterToolProgress(task.masterCar, tool.carName);
                done += prog;
            }
            if (task.masterCar === "Peugeot 9x8") { return { total: 38, done: Math.min(done, 38) }; }
            return { total, done };
        }

        function calcMasterTotalDoneAll(tasks) {
            let total = 0;
            for (let task of tasks) { const { done } = calcMasterTaskProgress(task); total += done; }
            return total;
        }

        function isMasterTaskLocked(task, totalDoneAll) {
            if (task.masterCar === "Bugatti Chiron SuperSport 300+") { return totalDoneAll < 800; }
            return false;
        }

        function renderMasterTasks() {
            const container = document.getElementById('masterCards');
            const tasks = buildMasterData();
            const TOTAL_TASKS = 967;
            const totalDone = calcMasterTotalDoneAll(tasks);

            for (let task of tasks) {
                const { total, done } = calcMasterTaskProgress(task);
                const progressPercent = total > 0 ? (done / total) * 100 : 0;
                const totalDoneAll = calcMasterTotalDoneAll(tasks);
                const locked = isMasterTaskLocked(task, totalDoneAll);
                const masterInfo = task.masterInfo || {};
                const level = masterInfo.level || '?';

                const maxStars = masterInfo.maxStars || 0;
                const perfScore = masterInfo.perfScore || 0;

                if (locked) cardClass += ' locked';

                html += `<div class="master-car-info">`;

                html += `<span class="label">${progressPercent.toFixed(1)}%</span>`;
                html += `</div>`;
                html += `<div class="master-tool-section">`;
                for (let tool of task.tools) {
                    const toolInfo = tool;
                    const level = toolInfo.level || '?';
                    const needKey = toolInfo.needKey || false;
                    const blueprintColor = toolInfo.blueprintColor || '金色';
                    const maxStars = toolInfo.maxStars || 0;
                    const perfScore = toolInfo.perfScore || 0;
                    const isMasterCar = tool.carName.trim().toLowerCase() === task.masterCar.trim().toLowerCase();
                    const scores = tool.scores;
                    const prog = getMasterToolProgress(task.masterCar, tool.carName);
                    const cellColor = colorMap[blueprintColor] || '#3b82f6';

                    html += `</div>`;
                    html += `<div class="master-perf-cells">`;
                    const unlockDim = (prog > 0) ? 'dim' : '';
                    html += `<span class="master-perf-cell unlock-label ${unlockDim}" data-master="${task.masterCar}" data-tool="${tool.carName}" data-idx="-1">未解锁</span>`;
                    for (let i = 0; i < scores.length; i++) {

                    const master = this.dataset.master;

                        const current = getMasterToolProgress(master, tool);
                        if (current > 0) { setMasterToolProgress(master, tool, 0); renderMasterTasks(); }

                    const current = getMasterToolProgress(master, tool);

                        if (toolObj) { newProg = Math.max(0, Math.min(newProg, toolObj.scores.length)); }
                    }
                    setMasterToolProgress(master, tool, newProg);
                    renderMasterTasks();
                });
            });

                    } else {

        // ========== 特殊赛事 - 计算器 ==========
        function renderCalculator() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) { alert('请先编辑并保存赛事数据！'); return; }
            try { specialEventData = JSON.parse(raw); } catch (e) { alert('数据损坏，请重新编辑。'); return; }
            const data = specialEventData;
            if (!data.tools || data.tools.length === 0) { alert('请至少添加一辆工具车。'); return; }

            data.tools.forEach(tool => {
                const name = tool.name;
                if (!calcVehicleStates[name]) calcVehicleStates[name] = { star: 0, unlocked: false };
            });

            document.getElementById('calcTitle').textContent = data.title || '特殊赛事';
            const updateTime = localStorage.getItem('lastEventUpdate') || '未知';
            document.getElementById('calcUpdateTime').textContent = `📅 数据版本: v${data.version || '?'}  ·  加载于: ${updateTime}`;
            renderCalcVehicles(data);
            renderCalcStages(data);
            renderCalcRewards(data);
        }

        function renderCalcVehicles(data) {
            const container = document.getElementById('calcVehicles');
            let html = '<div style="font-weight:600; margin-bottom:8px;">🚗 工具车</div>';
            data.tools.forEach(tool => {
                const state = calcVehicleStates[tool.name] || { star: 0, unlocked: false };
                const minStar = tool.needKey ? 1 : 0;
                html += `<div class="calc-vehicle-row"><span class="vehicle-level">${tool.level}</span><span class="vehicle-name">${tool.name}</span><div class="star-selector">`;
                for (let s = minStar; s <= tool.maxStars; s++) {
                    html += `<button class="${state.star===s?'active':''}" data-tool="${tool.name}" data-star="${s}">${s}</button>`;
                }
                html += `</div>`;
                if (tool.needKey) {
                    html += `<div class="key-toggle"><button class="${state.unlocked?'active':''}" data-tool="${tool.name}" data-key="unlock">已解锁</button><button class="${!state.unlocked?'active':''}" data-tool="${tool.name}" data-key="lock">未解锁</button></div>`;
                } else {
                    html += `<span style="font-size:0.8rem; color:#6c757d;">${state.star>0?'✅ 已解锁':'🔒 未解锁'}</span>`;
                }
                html += `<button class="view-card-btn" data-tool="${tool.name}">查看卡片</button></div>`;
            });
            container.innerHTML = html;
            container.querySelectorAll('.star-selector button').forEach(btn => {
                btn.addEventListener('click', function() {
                    const state = calcVehicleStates[this.dataset.tool];
                    if (!state) return;
                    state.star = parseInt(this.dataset.star);
                    const tool = specialEventData.tools.find(t => t.name === this.dataset.tool);
                    if (tool && !tool.needKey) state.unlocked = state.star > 0;
                    renderCalculator();
                });
            });
            container.querySelectorAll('.key-toggle button').forEach(btn => {
                btn.addEventListener('click', function() {
                    const state = calcVehicleStates[this.dataset.tool];
                    if (!state) return;
                    state.unlocked = this.dataset.key === 'unlock';
                    if (state.unlocked && state.star === 0) state.star = 1;
                    renderCalculator();
                });
            });
            container.querySelectorAll('.view-card-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const car = vehiclesData.find(v => v.name === this.dataset.tool);
                    if (car) showDetailModal(car);
                });
            });
        }

        function renderCalcStages(data) {
            const container = document.getElementById('calcStages');
            let html = '<div style="font-weight:600; margin-bottom:12px;">📋 阶段进度</div>';
            let cumDone = 0;
            const stageResults = [];
            data.stages.forEach((stage, idx) => {
                const tool = data.tools.find(t => t.name === stage.toolName);
                if (!tool) { stageResults.push({ unlocked: false, total: 0, done: 0, cumDone: 0 }); return; }
                const state = calcVehicleStates[stage.toolName] || { star: 0, unlocked: false };
                const hasVehicle = tool.needKey ? state.unlocked : state.star > 0;
                let canCompleteBase = true;
                if (!stage.provideTestDrive && !hasVehicle) canCompleteBase = false;
                const isUnlocked = cumDone >= (stage.unlockConditions || 0);
                let total = 0, done = 0;
                (stage.tasks || []).forEach(task => {
                    const cond = task.totalConditions || 0;
                    total += cond;
                    if (canCompleteBase && isUnlocked && (task.requiredStar <= state.star)) done += cond;
                });
                if (isUnlocked) cumDone += done;
                stageResults.push({ unlocked: isUnlocked, total, done, cumDone, toolName: stage.toolName });
            });
            stageResults.forEach((res, idx) => {
                const stage = data.stages[idx];
                const icon = res.unlocked ? '☑' : '☒';
                const pct = res.total > 0 ? (res.done / res.total * 100) : 0;
                html += `<div class="calc-stage-row"><div class="stage-row-header"><span class="stage-icon">${icon}</span><span class="stage-desc">阶段 ${idx+1}</span><span>工具车：${res.toolName}</span><span>${res.done}/${res.total}</span></div><div class="stage-progress-wrap"><div class="track"><div class="fill" style="width:${pct}%;"></div></div><span class="label">${pct.toFixed(0)}%</span></div><div style="font-size:0.8rem; color:#94a3b8;">累计：${res.cumDone}</div></div>`;
            });
            container.innerHTML = html;
        }

        function renderCalcRewards(data) {
            const container = document.getElementById('calcRewards');
            const rewardMap = {};

            function addReward(type, value, isDone, targetVehicle) {
                if (!type || type === '__custom__' || value === 0) return;
                let key = type;
                const toolRelated = ['工具车图纸','工具车钥匙','工具车车贴','工具车金卡'];
                if (toolRelated.includes(type) && targetVehicle) {
                    key = `${targetVehicle} ${type}`;
                }
                if (!rewardMap[key]) rewardMap[key] = { total: 0, done: 0 };
                rewardMap[key].total += value;
                if (isDone) rewardMap[key].done += value;
            }

            let cumDone = 0;
            data.stages.forEach((stage) => {
                const tool = data.tools.find(t => t.name === stage.toolName);
                if (!tool) return;
                const state = calcVehicleStates[stage.toolName] || { star: 0, unlocked: false };
                const hasVehicle = tool.needKey ? state.unlocked : state.star > 0;
                let canCompleteBase = true;
                if (!stage.provideTestDrive && !hasVehicle) canCompleteBase = false;
                const isUnlocked = cumDone >= (stage.unlockConditions || 0);
                let stageDone = 0;
                (stage.tasks || []).forEach(task => {
                    const cond = task.totalConditions || 0;
                    const rewardValue = task.rewardValue || 0;
                    const totalVal = cond * rewardValue;
                    const isTaskDone = canCompleteBase && isUnlocked && (task.requiredStar <= state.star);
                    if (isTaskDone) {
                        stageDone += cond;
                    }
                    addReward(task.rewardType, totalVal, isTaskDone, task.targetVehicle);
                });
                if (isUnlocked) cumDone += stageDone;
            });

            data.milestones.forEach(m => {
                const isDone = cumDone >= m.conditions;
                addReward(m.rewardType, m.rewardValue, isDone, m.targetVehicle);
            });

            data.clubRewards.forEach(c => {
                addReward(c.rewardType, c.rewardValue, true, c.targetVehicle);
            });

            let html = '<div style="font-weight:600; margin-bottom:8px;">🎁 奖励汇总</div>';
            const sortedKeys = Object.keys(rewardMap).sort();
            if (sortedKeys.length === 0) {
                html += '<div style="color:#94a3b8;">暂无奖励数据</div>';
            } else {
                const general = sortedKeys.filter(k => !k.includes('万能'));
                const wildcard = sortedKeys.filter(k => k.includes('万能'));
                if (general.length) {
                    html += `<div class="calc-reward-row">`;
                    general.forEach(key => {
                        const v = rewardMap[key];
                        html += `<span class="reward-item">${key}：<span class="num done">${v.done.toLocaleString()}</span> / <span class="num total">${v.total.toLocaleString()}</span></span>`;
                    });
                    html += `</div>`;
                }
                if (wildcard.length) {
                    html += `<div style="font-size:0.9rem; font-weight:600; margin-top:12px; color:#fbbf24;">🌟 万能资源汇总</div>`;
                    html += `<div class="calc-reward-row">`;
                    wildcard.forEach(key => {
                        const v = rewardMap[key];
                        html += `<span class="reward-item">${key}：<span class="num done">${v.done.toLocaleString()}</span> / <span class="num total">${v.total.toLocaleString()}</span></span>`;
                    });
                    html += `</div>`;
                }
            }

            const totalAll = data.stages.reduce((s, st) => s + st.tasks.reduce((ts, t) => ts + (t.totalConditions||0), 0), 0);
            html += `<div style="margin-top:12px; font-size:0.9rem;">进度（已完成条件/总条件）：${cumDone} / ${totalAll}</div>`;

            const packs = data.packs || {};
            const packItems = [];
            if (packs.bluePrintBlue) packItems.push(`📘 蓝币图纸包：${cumDone>=packs.bluePrintBlueCond?'✅ 已解锁':`🔒 ${cumDone}/${packs.bluePrintBlueCond}`}`);
            if (packs.bluePrintGold) packItems.push(`📗 点券图纸包：${cumDone>=packs.bluePrintGoldCond?'✅ 已解锁':`🔒 ${cumDone}/${packs.bluePrintGoldCond}`}`);
            if (packs.keyBlue) packItems.push(`🔑 蓝币钥匙包：${cumDone>=packs.keyBlueCond?'✅ 已解锁':`🔒 ${cumDone}/${packs.keyBlueCond}`}`);
            if (packs.keyGold) packItems.push(`🔑 点券钥匙包：${cumDone>=packs.keyGoldCond?'✅ 已解锁':`🔒 ${cumDone}/${packs.keyGoldCond}`}`);
            if (packItems.length > 0) html += `<div class="calc-reward-row">${packItems.map(i => `<span class="reward-item">${i}</span>`).join('')}</div>`;

            let keyUnlockCond = Infinity;
            data.milestones.forEach(m => { if (m.rewardType && m.rewardType.includes('钥匙') && m.conditions < keyUnlockCond) keyUnlockCond = m.conditions; });
            html += `<div class="calc-reward-row"><span class="reward-item">🔑 ${data.themeCar||'主题车'}钥匙条件：${keyUnlockCond!==Infinity?`${cumDone}/${keyUnlockCond}`:'无'}</span></div>`;

            if (data.milestones && data.milestones.length > 0) {
                html += `<div style="font-weight:600; margin-top:16px;">🏆 里程碑</div><div class="calc-milestone-simple">`;
                data.milestones.forEach(m => {
                    let name = m.rewardType;
                    if (m.rewardType.includes('工具车') && m.targetVehicle) name = `${m.targetVehicle} ${m.rewardType.replace('工具车','')}`;
                    html += `<div class="ms-item" style="${cumDone>=m.conditions?'border-color:#22c55e;':'border-color:#ef4444;'}">${m.conditions}条件 → ${name} x${m.rewardValue}</div>`;
                });
                html += `</div>`;
            }

            container.innerHTML = html;
        }

        function fillAllCalc() {
            if (!specialEventData) return;
            specialEventData.tools.forEach(tool => {
                const state = calcVehicleStates[tool.name];
                if (!state) return;
                state.star = tool.maxStars || 0;
                if (tool.needKey) state.unlocked = true;
            });
            renderCalculator();
        }

        function clearAllCalc() {
            if (!specialEventData) return;
            specialEventData.tools.forEach(tool => {
                const state = calcVehicleStates[tool.name];
                if (!state) return;
                state.star = 0;
                if (tool.needKey) state.unlocked = false;
            });
            renderCalculator();
        }

        // ========== 远程同步（核心新增功能） ==========
        async function loadRemoteEventData() {
            try {
                const url = REMOTE_EVENT_URL + '?t=' + Date.now();
                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 'Cache-Control': 'no-cache' }
                });

                if (!response.ok) {
                    throw new Error(`HTTP 错误: ${response.status}`);
                }

                const data = await response.json();

                if (typeof data !== 'object' || !data.hasOwnProperty('tools')) {
                    throw new Error('远程数据格式无效');
                }

                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                specialEventData = data;
                localStorage.setItem('lastEventUpdate', new Date().toLocaleString());

                console.log('✅ 远程活动数据加载成功，版本:', data.version || '未知');
                return true;
            } catch (error) {
                console.warn('⚠️ 远程加载失败，使用本地缓存', error);
                const local = localStorage.getItem(STORAGE_KEY);
                if (local) {
                    try {
                        specialEventData = JSON.parse(local);
                        console.log('📦 已加载本地缓存数据');
                    } catch (e) {
                        console.error('本地缓存损坏');
                    }
                }
                return false;
            }
        }

        async function syncToRemote() {
            // 先保存当前编辑器数据到内存和本地
            saveEventDataFromEditor();

            if (!specialEventData) {
                alert('❌ 没有数据可以发布，请先编辑并保存赛事！');
                return;
            }

            const jsonStr = JSON.stringify(specialEventData, null, 2);

            // 创建一个下载链接，让管理员手动上传到 GitHub
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const title = specialEventData.title || '未命名活动';
            a.download = `event.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            alert(`✅ 已生成 event.json 文件！\n\n请按以下步骤发布到云端：\n1. 登录 GitHub\n2. 进入仓库 LeoProMax0336/A9-Assistant\n3. 点击 event.json 文件\n4. 点击编辑（铅笔图标）\n5. 将下载的文件内容全选复制，粘贴进去覆盖\n6. 提交更改\n\n所有玩家刷新页面即可获取最新活动！`);
        }

        // ========== 导航函数 ==========
        function goHome() {
            homePage.style.display = 'flex';
            functionContainer.classList.remove('active');
            document.getElementById('levelNav').style.display = 'none';
            document.getElementById('floatGroup').style.display = 'none';
            exitCompareBtn.style.display = 'none';
            if (compareMode) exitCompareMode();
            window.scrollTo(0, 0);
        }

        function switchToCars() {
            homePage.style.display = 'none';
            functionContainer.classList.add('active');
            carsFunction.style.display = 'block';
            masterFunction.style.display = 'none';
            specialFunction.style.display = 'none';
            document.getElementById('levelNav').style.display = 'flex';
            document.getElementById('floatGroup').style.display = 'flex';
            compareBtn.style.display = 'flex';
            currentAppMode = 'cars';
            renderCars();
            window.scrollTo(0, 0);
        }

        function switchToMaster() {
            homePage.style.display = 'none';
            functionContainer.classList.add('active');
            carsFunction.style.display = 'none';
            masterFunction.style.display = 'block';
            specialFunction.style.display = 'none';
            document.getElementById('levelNav').style.display = 'none';
            document.getElementById('floatGroup').style.display = 'none';
            compareBtn.style.display = 'none';
            exitCompareBtn.style.display = 'none';
            currentAppMode = 'master';
            renderMasterTasks();
            window.scrollTo(0, 0);
        }

        function switchToSpecial() {
            homePage.style.display = 'none';
            functionContainer.classList.add('active');
            carsFunction.style.display = 'none';
            masterFunction.style.display = 'none';
            specialFunction.style.display = 'block';
            document.getElementById('levelNav').style.display = 'none';
            document.getElementById('floatGroup').style.display = 'none';
            compareBtn.style.display = 'none';
            exitCompareBtn.style.display = 'none';
            currentAppMode = 'special';
            // 先尝试加载远程数据，再显示界面
            loadRemoteEventData().then(() => {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    try {
                        const data = JSON.parse(raw);
                        specialEventData = data;
                        loadEventDataToEditor(data);
                        document.getElementById('specialEditor').style.display = 'none';
                        document.getElementById('specialCalculator').style.display = 'block';
                        renderCalculator();
                    } catch (e) {
                        document.getElementById('specialEditor').style.display = 'block';
                        document.getElementById('specialCalculator').style.display = 'none';
                    }
                } else {
                    document.getElementById('specialEditor').style.display = 'block';
                    document.getElementById('specialCalculator').style.display = 'none';
                }
            });
            window.scrollTo(0, 0);
        }

        // ========== 滚动控制 ==========
        let lastScrollY = window.scrollY;
        let scrollTimeout = null;

        function handleScroll() {
            const currentScrollY = window.scrollY;
            let toolbar = null;
            if (currentAppMode === 'cars') toolbar = carsToolbar;
            else if (currentAppMode === 'master') toolbar = masterToolbar;
            else if (currentAppMode === 'special') toolbar = specialToolbar;
            if (toolbar) {
                if (currentScrollY < lastScrollY) { toolbar.classList.remove('hidden'); } else if (currentScrollY > lastScrollY + 10) { toolbar.classList.add('hidden'); }
            }
            lastScrollY = currentScrollY;
            if (currentAppMode === 'cars') {
                const floatGroup = document.getElementById('floatGroup');
                if (scrollTimeout) clearTimeout(scrollTimeout);
                floatGroup.classList.remove('hidden');
                scrollTimeout = setTimeout(() => { floatGroup.classList.add('hidden'); }, 1500);
            }
        }

        function handleToolbarClick(e) {
            let toolbar = null;
            if (currentAppMode === 'cars') toolbar = carsToolbar;
            else if (currentAppMode === 'master') toolbar = masterToolbar;
            else if (currentAppMode === 'special') toolbar = specialToolbar;
            if (toolbar) toolbar.classList.remove('hidden');
        }

        function handleFloatGroupClick() {
            const floatGroup = document.getElementById('floatGroup');
            floatGroup.classList.remove('hidden');
            if (scrollTimeout) clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => { floatGroup.classList.add('hidden'); }, 2000);
        }

        // ========== 事件绑定 ==========
        function bindEvents() {
            sortFieldSelect.addEventListener('change', () => { currentSortField = sortFieldSelect.value; renderCars(); });
            sortOrderSelect.addEventListener('change', () => { currentSortOrder = sortOrderSelect.value; renderCars(); });
            brandSelect.addEventListener('change', (e) => { currentBrand = e.target.value; renderCars(); });
            leagueSelect.addEventListener('change', (e) => { currentLeague = e.target.value; renderCars(); });
            searchInput.addEventListener('input', (e) => { currentSearch = e.target.value; renderCars(); });
            const modeBtns = document.querySelectorAll('.mode-btn');
            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    sortMode = btn.getAttribute('data-mode');
                    modeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderCars();
                });
            });
            compareBtn.addEventListener('click', () => {
                if (compareMode) exitCompareMode();
                else { compareMode = true; renderCars(); compareBtn.classList.add('active'); compareBtn.innerHTML = '✖'; compareBtn.style.background = "#ef4444"; exitCompareBtn.style.display = 'block'; }
            });
            exitCompareBtn.addEventListener('click', () => exitCompareMode());
            backToTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
            helpBtn.addEventListener('click', showHelpModal);
            helpBtnMaster.addEventListener('click', showHelpModal);
            helpBtnSpecial.addEventListener('click', showHelpModal);
            window.addEventListener('scroll', handleScroll);
            document.querySelectorAll('.toolbar').forEach(tb => { tb.addEventListener('click', handleToolbarClick); });
            document.getElementById('floatGroup').addEventListener('click', handleFloatGroupClick);

            document.getElementById('toggleEditorMode').addEventListener('click', () => {
                document.getElementById('specialEditor').style.display = 'block';
                document.getElementById('specialCalculator').style.display = 'none';
            });
            document.getElementById('toggleCalculatorMode').addEventListener('click', () => {
                saveEventDataFromEditor();
                document.getElementById('specialEditor').style.display = 'none';
                document.getElementById('specialCalculator').style.display = 'block';
                renderCalculator();
            });
            document.getElementById('previewCalculator').addEventListener('click', () => {
                saveEventDataFromEditor();
                document.getElementById('specialEditor').style.display = 'none';
                document.getElementById('specialCalculator').style.display = 'block';
                renderCalculator();
            });
            document.getElementById('saveEventData').addEventListener('click', () => {
                saveEventDataFromEditor();
                alert('赛事数据已保存！');
            });
            document.getElementById('syncToRemoteBtn').addEventListener('click', syncToRemote);
            document.getElementById('clearEventDataBtn').addEventListener('click', () => {
                if (confirm('确定要清空所有特殊赛事数据吗？此操作不可撤销。')) {
                    localStorage.removeItem(STORAGE_KEY);
                    specialEventData = null;
                    selectedTools = [];
                    stages = [];
                    milestones = [];
                    clubRewards = [];
                    calcVehicleStates = {};
                    document.getElementById('specialEditor').style.display = 'block';
                    document.getElementById('specialCalculator').style.display = 'none';
                    renderToolList();
                    renderStages();
                    renderMilestones();
                    renderClubRewards();
                    alert('数据已清空！');
                }
            });

            const toolSearchInput = document.getElementById('toolSearchInput');
            toolSearchInput.addEventListener('input', function() {
                const query = this.value.trim().toLowerCase();
                const results = document.getElementById('toolSearchResults');
                if (query.length === 0) { results.classList.remove('visible'); return; }
                const matches = vehiclesData.filter(v => v.name.toLowerCase().includes(query) || (v.nickname && v.nickname.toLowerCase().includes(query)));
                const existing = selectedTools.map(t => t.toLowerCase());
                const filtered = matches.filter(v => !existing.includes(v.name.toLowerCase()));
                if (filtered.length === 0) { results.classList.remove('visible'); return; }
                results.innerHTML = '';
                filtered.forEach(v => {
                    const div = document.createElement('div');
                    div.className = 'editor-search-result';
                    div.innerHTML = `<span><span class="car-level">${v.level}</span> ${v.name}</span><span style="font-size:0.8rem; color:#6c757d;">${v.nickname || ''}</span>`;
                    div.addEventListener('click', () => { addTool(v.name); toolSearchInput.value = ''; results.classList.remove('visible'); });
                    results.appendChild(div);
                });
                results.classList.add('visible');
            });
            document.addEventListener('click', function(e) {
                if (!e.target.closest('#toolSearchInput') && !e.target.closest('#toolSearchResults')) {
                    document.getElementById('toolSearchResults').classList.remove('visible');
                }
            });
            document.getElementById('addToolBtn').addEventListener('click', function() {
                const input = document.getElementById('toolSearchInput');
                const query = input.value.trim();
                if (!query) return;
                const match = vehiclesData.find(v => v.name.toLowerCase() === query.toLowerCase());
                if (match && !selectedTools.includes(match.name)) { addTool(match.name); input.value = ''; document.getElementById('toolSearchResults').classList.remove('visible'); } else { alert('未找到车辆，请使用搜索框选择。'); }
            });

            document.getElementById('addStageBtn').addEventListener('click', addStage);
            document.getElementById('addMilestoneBtn').addEventListener('click', addMilestone);
            document.getElementById('addClubBtn').addEventListener('click', addClubReward);
            document.getElementById('calcFillAll').addEventListener('click', fillAllCalc);
            document.getElementById('calcClearAll').addEventListener('click', clearAllCalc);
            document.getElementById('fillAllBtn').addEventListener('click', fillMasterAll);
            document.getElementById('clearAllBtn').addEventListener('click', clearMasterAll);
        }

        // ========== 初始化 ==========
        function init() {
            initDOM();
            initTheme();
            populateFilters();
            bindEvents();
            goHome();
            renderCars();
            // 预加载远程数据（但不阻塞页面）
            loadRemoteEventData().then(() => {
                console.log('📦 远程数据预加载完成');
            });
            console.log('🚗 狂野飙车9 · 小助手已启动！');
            console.log('📚 共加载 ' + vehiclesData.length + ' 辆车');
            console.log('☁️ 远程配置地址: ' + REMOTE_EVENT_URL);
        }

        function initDOM() {
            gridContainer = document.getElementById("carsGrid");
            brandSelect = document.getElementById("brandFilter");
            leagueSelect = document.getElementById("leagueFilter");
            sortFieldSelect = document.getElementById("sortField");
            sortOrderSelect = document.getElementById("sortOrder");
            searchInput = document.getElementById("searchInput");
            modeToggle = document.getElementById("modeToggle");
            helpBtn = document.getElementById("helpBtn");
            helpBtnMaster = document.getElementById("helpBtnMaster");
            helpBtnSpecial = document.getElementById("helpBtnSpecial");
            compareBtn = document.getElementById("floatCompareBtn");
            themeBtn = document.getElementById("themeBtn");
            backToTopBtn = document.getElementById("backToTopBtn");
            exitCompareBtn = document.getElementById("exitCompareBtn");

            document.querySelectorAll('.home-card').forEach(card => {
                card.addEventListener('click', function() {
                    const target = this.dataset.target;
                    if (target === 'cars') switchToCars();
                    else if (target === 'master') switchToMaster();
                    else if (target === 'special') switchToSpecial();
                });
            });
            document.getElementById('backHomeFromCars').addEventListener('click', goHome);
            document.getElementById('backHomeFromMaster').addEventListener('click', goHome);
            document.getElementById('backHomeFromSpecial').addEventListener('click', goHome);
        }

        function initTheme() {
            const saved = localStorage.getItem('a9_theme');
            if (saved === 'dark') document.body.classList.add('dark');
            themeBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark');
                localStorage.setItem('a9_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
            });
        }

        // 数据初始化
        vehiclesData = processAllVehicles();

        // ========== 启动 ==========
        init();
    </script>
</div>
</body>
